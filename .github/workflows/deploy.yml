# Build and deploy the site container to Google Cloud Run.
#
# Triggers
#   - push to main              → deploys beta
#   - manual workflow_dispatch  → choose beta or production
#
# Required GitHub repository Variables:
#   GCP_PROJECT_ID
#   GCP_REGION
#   CLOUD_RUN_SERVICE
#   CLOUD_RUN_SERVICE_BETA
#   ARTIFACT_REGISTRY_REPO
#   FIREBASE_PROJECT_ID
#   RUNTIME_SERVICE_ACCOUNT
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_DEPLOY_SERVICE_ACCOUNT
#   NEXT_PUBLIC_GTM_ID optional
#
# Required Google Cloud setup:
#   - Artifact Registry repo exists
#   - Cloud Run beta/prod services exist
#   - Runtime service account has Firestore access
#   - Deployer service account can deploy Cloud Run and push images

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - production

concurrency:
  group: deploy-cloud-run-${{ github.ref }}-${{ github.event.inputs.target || 'beta' }}
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, build, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run lint
      - run: npm test

      - name: Build sanity check
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://beta.medicareinspokane.com
          NEXT_PUBLIC_SITE_ENV: staging
          NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}

  deploy:
    name: Build image and deploy to Cloud Run
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}
      RUNTIME_SA: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      TARGET: ${{ github.event.inputs.target || 'beta' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target config
        id: cfg
        run: |
          if [ "$TARGET" = "production" ]; then
            echo "service=${{ vars.CLOUD_RUN_SERVICE }}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://www.medicareinspokane.com" >> "$GITHUB_OUTPUT"
            echo "site_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "service=${{ vars.CLOUD_RUN_SERVICE_BETA }}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://beta.medicareinspokane.com" >> "$GITHUB_OUTPUT"
            echo "site_env=staging" >> "$GITHUB_OUTPUT"
          fi

          echo "image=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/site-${TARGET}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Validate required variables
        run: |
          test -n "${{ env.PROJECT_ID }}" || (echo "::error::GCP_PROJECT_ID is missing" && exit 1)
          test -n "${{ env.REGION }}" || (echo "::error::GCP_REGION is missing" && exit 1)
          test -n "${{ env.AR_REPO }}" || (echo "::error::ARTIFACT_REGISTRY_REPO is missing" && exit 1)
          test -n "${{ env.RUNTIME_SA }}" || (echo "::error::RUNTIME_SERVICE_ACCOUNT is missing" && exit 1)
          test -n "${{ env.FIREBASE_PROJECT_ID }}" || (echo "::error::FIREBASE_PROJECT_ID is missing" && exit 1)
          test -n "${{ steps.cfg.outputs.service }}" || (echo "::error::Cloud Run service variable is missing" && exit 1)
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER is missing" && exit 1)
          test -n "${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}" || (echo "::error::GCP_DEPLOY_SERVICE_ACCOUNT is missing" && exit 1)

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build container image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SITE_URL='${{ steps.cfg.outputs.site_url }}' \
            --build-arg NEXT_PUBLIC_SITE_ENV='${{ steps.cfg.outputs.site_env }}' \
            --build-arg NEXT_PUBLIC_GTM_ID='${{ vars.NEXT_PUBLIC_GTM_ID }}' \
            -t "${{ steps.cfg.outputs.image }}" \
            .

      - name: Push container image
        run: docker push "${{ steps.cfg.outputs.image }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.cfg.outputs.service }}
          region: ${{ env.REGION }}
          image: ${{ steps.cfg.outputs.image }}
          flags: >-
            --service-account=${{ env.RUNTIME_SA }}
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=10
          env_vars: |
            NEXT_PUBLIC_SITE_URL=${{ steps.cfg.outputs.site_url }}
            NEXT_PUBLIC_SITE_ENV=${{ steps.cfg.outputs.site_env }}
            NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
            FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }}
            NODE_ENV=production

      - name: Show service URL
        run: |
          echo "Deployed target: $TARGET"
          gcloud run services describe "${{ steps.cfg.outputs.service }}" \
            --region "$REGION" \
            --format='value(status.url)'
