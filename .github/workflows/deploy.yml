name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - id: vars
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            echo "SERVICE=${{ vars.CLOUD_RUN_SERVICE }}" >> $GITHUB_OUTPUT
            echo "SITE_ENV=production" >> $GITHUB_OUTPUT
          else
            echo "SERVICE=${{ vars.CLOUD_RUN_SERVICE_BETA }}" >> $GITHUB_OUTPUT
            echo "SITE_ENV=staging" >> $GITHUB_OUTPUT
          fi

      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - run: |
          IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/site:${{ github.sha }}
          docker build -t $IMAGE \
            --build-arg NEXT_PUBLIC_SITE_ENV=${{ steps.vars.outputs.SITE_ENV }} \
            .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - run: |
          gcloud run deploy ${{ steps.vars.outputs.SERVICE }} \
            --image=$IMAGE \
            --region=${{ vars.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ vars.RUNTIME_SERVICE_ACCOUNT }} \
            --set-env-vars=FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }},NEXT_PUBLIC_SITE_ENV=${{ steps.vars.outputs.SITE_ENV }}
